{% extends "base.html"%}


{% block title %}Popular YouTube Channels{% endblock title%}


{% block content %}
<div class="row">
    {% for channel in channels %}
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ channel.name }}</h5>
                <p class="card-text">Subscribers: {{ channel.subscribers }}</p>
                <a href="{{ url_for('channel_detail', id=channel.id) }}" class="btn btn-primary">View Details</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock content %}
