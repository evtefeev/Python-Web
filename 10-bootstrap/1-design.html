<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .body{
            margin: 0px;
            padding: 0px;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 0px;
            margin: 1px;
        }

        .box {
            background: #db3434;
            color: white;
            padding: 0px;
            margin: 1px;
            text-align: center;
        }

        /* Медіа-запит для мобільних */
        @media (max-width: 768px) {
            .container {
                width: 80%;
                margin: 0 auto;
            }

            .box {
                background: #3498db;
                color: white;
                padding: 10px;
                margin: 5px;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            <h1>Привіт, адаптивний дизайн!</h1>
            <p>Спробуйте змінити розмір вікна</p>
        </div>
    </div>
</body>

</html>
