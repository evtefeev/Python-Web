<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Form</title>
</head>

<body>

    {% endif %}
    <form method="post" enctype="multipart/form-data">

    </form>

    <a href="{{url_for('f_page_2')}}">All files</a>
</body>

</html>
