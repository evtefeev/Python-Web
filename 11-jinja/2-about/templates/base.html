<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User info</title>
</head>

<body>
    <h1>Hello {{name}}</h1>

    <p>Age: {{age}}</p>

    {% if age > 18 %}
    Adult
    {% else %}
    Child
    {% endif %}
    <p>
        User hobbies:
    <ul>
        {% for hobby in hobbies%}
        <li>{{hobby}}</li>
        {%endfor%}
    </ul>
    </p>

</body>

</html>
