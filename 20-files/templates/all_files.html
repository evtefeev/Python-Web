<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>All files</title>
</head>

<body>
    <div style="display: flex;">
        {% for name in data %}

        <div style="margin: 10px; align-content: end;">
            <img width="100px" src="{{url_for('static', filename='users_files/'+name)}}">
            <p>{{''.join(name.split("_")[1:])}}</p>
        </div>

        {% endfor %}
    </div>
    <a href="{{url_for('f_page_1')}}">Upload new</a>
</body>

</html>
