<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Store</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        header {
            background: #111;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 120px);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        nav a {
            display: inline-block;
            padding: 12px 24px;
            background: #007BFF;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        nav a:hover {
            background: #0056b3;
        }

        footer {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            background: #eee;
        }
    </style>
</head>
<body>

<header>
    <h2>Shoe Store</h2>
</header>

<main>
    <h1>Вітаємо у нашому магазині взуття 👟</h1>
    <p>Знайдіть найкраще взуття для будь-якого стилю та сезону</p>

    <nav>
        <a href="/products">Переглянути товари</a>
    </nav>
</main>

<footer>
    © 2026 Shoe Store
</footer>

</body>
</html>
